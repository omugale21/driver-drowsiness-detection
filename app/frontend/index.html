<!DOCTYPE html>
<html>
<head>
<title>Driver Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:white;
}

h1 {
    text-align:center;
    padding:10px;
    color:#38bdf8;
}

.container {
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:20px;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

img {
    width:100%;
    border-radius:10px;
}

.status-normal { color: #22c55e; }
.status-warning { color: #facc15; }
.status-critical { color: #ef4444; }

.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}
</style>
</head>

<body>

<h1>🚗 AI Driver Monitoring Dashboard</h1>

<div class="container">

<!-- LEFT -->
<div class="card">
    <h3>Live Feed</h3>
    <img src="/video">
</div>

<!-- RIGHT -->
<div>

<div class="card">
    <h3>Status</h3>
    <div id="status" style="font-size:28px; font-weight:bold;"></div>
    <div style="margin-top:10px;">
        Fatigue: <span id="score"></span>%
    </div>
</div>

<div class="card">
    <h3>Fatigue Graph</h3>
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h3>Events</h3>
    <div id="events" style="max-height:200px; overflow:auto;"></div>
</div>

</div>

</div>

<script>
let ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Fatigue Score',
            data: [],
            borderWidth: 3,
            tension: 0.4,
            pointRadius: 2
        }]
    },
    options: {
        scales: {
            y: {
                min: 0,
                max: 100
            }
        }
    }
});

function updateColor(score){
    let statusEl = document.getElementById('status');

    statusEl.classList.remove("status-normal","status-warning","status-critical","blink");

    if(score < 40){
        statusEl.innerText = "NORMAL";
        statusEl.classList.add("status-normal");
    }
    else if(score < 60){
        statusEl.innerText = "WARNING";
        statusEl.classList.add("status-warning");
    }
    else{
        statusEl.innerText = "CRITICAL";
        statusEl.classList.add("status-critical","blink");
    }
}

async function updateStatus(){
    let res = await fetch('/status');
    let data = await res.json();

    document.getElementById('score').innerText = data.fatigue_score;

    updateColor(data.fatigue_score);
}

async function updateEvents(){
    let res = await fetch('/events');
    let data = await res.json();

    document.getElementById('events').innerHTML =
        data.reverse().map(e => `<div style="padding:4px 0;">${e}</div>`).join('');
}

async function updateChart(){
    let res = await fetch('/history');
    let data = await res.json();

    chart.data.labels = data.map((_, i) => i);
    chart.data.datasets[0].data = data;

    chart.data.datasets[0].borderColor = data.map(v => {
        if(v < 40) return "#22c55e";
        if(v < 60) return "#facc15";
        return "#ef4444";
    });

    chart.update();
}

setInterval(updateStatus, 1000);
setInterval(updateEvents, 2000);
setInterval(updateChart, 1000);
</script>

</body>
</html>
