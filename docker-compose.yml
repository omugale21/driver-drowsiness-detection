version: '3'

services:

  flask:
    build: .
    container_name: flask_dashboard
    command: python -m app.api.app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    devices:
      - "/dev/video0:/dev/video0"
    privileged: true

  ai-engine:
    build: .
    container_name: ai_engine
    command: python -m app.main
    volumes:
      - .:/app
    devices:
      - "/dev/video0:/dev/video0"
    privileged: true
    depends_on:
      - flask